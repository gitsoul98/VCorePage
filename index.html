<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V Core 2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <!-- <link rel="stylesheet" href="style.css"> -->
    <!-- FONT  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- FONT END -->

    <style>
        :root {
            --bg: #1b2436;
            --card: #253247;
            --text: #f8fafc;
            --border: rgba(255, 255, 255, .08);
        }

        .light-theme {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* .elms-sans-<uniquifier> {
  font-family: "Elms Sans", sans-serif;
  font-optical-sizing: auto;
  font-weight: <weight>;
  font-style: normal;
} */
        body {
            font-family:
                "Elms Sans", "Segoe UI", sans-serif;

            background:
                radial-gradient(circle at top left,
                    rgba(37, 99, 235, 0.08),
                    transparent 35%),
                radial-gradient(circle at bottom right,
                    rgba(20, 184, 166, 0.08),
                    transparent 35%),
                var(--bg);

            color: var(--text);

            overflow-x: hidden;

            transition:
                background-color 0.4s ease,
                color 0.4s ease,
                border-color 0.4s ease;
        }

        /* .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 25px;
            transition: all 1s ease;
        } */

        .logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .menu {
            list-style: none;
        }

        .menu li {
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu li:hover {
            background: rgba(100, 100, 100, 0.15);
        }

        .main {
            margin-left: 0;
            padding: 30px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .toggle-btn {
            border: none;
            cursor: pointer;
            padding: 12px 22px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(20px);
            transition:
                background-color 1s ease,
                color 1s ease,
                transform 0.4s ease,
                box-shadow 0.4s ease;
            box-shadow:
                0 4px 12px rgba(0, 0, 0, .04),
                0 12px 30px rgba(0, 0, 0, .06);

        }

        /* .card:hover {

            transform:
                translateY(-6px) scale(1.02);

            box-shadow:

                0 20px 40px rgba(0, 0, 0, .2),

                0 0 20px rgba(37, 99, 235, .25);
        } */

        .card h3 {
            margin-bottom: 10px;
        }

        .number {
            font-size: 34px;
            font-weight: 700;
        }

        .theme-overlay {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            /* z-index: 999; */
        }

        .theme-overlay.active {
            animation: reveal 1200ms ease-out forwards;
        }

        @keyframes reveal {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(65);
                opacity: 0;
                filter: blur(25px);
            }
        }

        /* MODALS EDIT VIEW AND ALSO ADD CSS */

        .modal-overlay {

            display: none;

            position: fixed;

            inset: 0;

            background: rgba(15, 23, 42, 0.35);

            backdrop-filter: blur(10px);

            -webkit-backdrop-filter: blur(10px);

            justify-content: center;

            align-items: center;

            /* z-index: 999; */

            opacity: 0;

            visibility: hidden;

            transition:
                opacity .25s ease,
                visibility .25s ease;
        }

        /* .modal-card {

            width: 500px;

            max-width: 90%;
        } */

        .modal-card {

            width: 500px;

            max-width: 90%;

            border-radius: 24px;

            border: 1px solid rgba(255, 255, 255, .08);

            box-shadow:
                0 25px 50px rgba(0, 0, 0, .25),
                0 10px 20px rgba(0, 0, 0, .15);

            transform:
                translateY(20px) scale(.96);

            opacity: 0;

            transition:
                all .28s cubic-bezier(.22, 1, .36, 1);
        }

        .modal-overlay.show {

            opacity: 1;

            visibility: visible;
        }

        .modal-overlay.show .modal-card {

            transform:
                translateY(0) scale(1);

            opacity: 1;
        }

        .modal-header {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 20px;
        }

        .modal-close {

            background: transparent;

            border: none;

            color: var(--text);

            font-size: 24px;

            cursor: pointer;
        }

        .modal-row {

            margin-bottom: 15px;
        }

        .modal-row label {

            display: block;

            margin-bottom: 6px;
        }

        .modal-row input,
        .modal-row select {

            width: 100%;

            padding: 10px;

            border-radius: 8px;

            border: 1px solid var(--border);

            background: var(--bg);

            color: var(--text);
        }

        .theme-btn {

            padding: 10px 16px;

            border: none;

            border-radius: 8px;

            background: #14b8a6;

            color: white;

            cursor: pointer;
        }

        /* END OF MODALS VIEW AND EDIT CSS */


        /* TABLES CSS */
        .table-card {
            margin-top: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 3px;
            text-align: left;
        }

        tr {
            border-bottom: 1px solid var(--border);
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            opacity: 0.7;
        }

        /* Row Selection Styles*/
        .row-selected {
            background: rgba(20, 184, 166, 0.12) !important;
            border-radius: 8px;
        }

        .row-selected td {
            background: rgba(20, 184, 166, 0.15) !important;
            /* border:1px solid rgba(20,184,166,.25) !important; */
            /* border-radius:8px; */
            /* box-shadow:inset 4px 0 0 #14b8a6; */
        }

        /* Row Selection Styles End */

        /* =========================
   DATATABLE SORTING
   ========================= */
        table.dataTable thead th {
            position: relative;
            transition: all .25s ease;
        }

        /* Header Hover */
        table.dataTable thead th:hover {
            background: rgba(20, 184, 166, 0.65) !important;
        }

        /* Default Sorting Icons */
        table.dataTable thead .sorting:before,
        table.dataTable thead .sorting:after,
        table.dataTable thead .sorting_asc:before,
        table.dataTable thead .sorting_asc:after,
        table.dataTable thead .sorting_desc:before,
        table.dataTable thead .sorting_desc:after {

            font-size: 7px !important;
            color: rgba(255, 255, 255, 0.35) !important;
            opacity: .35 !important;
        }

        /* Active Ascending */
        table.dataTable thead .sorting_asc:before {
            color: #ffffff !important;
            opacity: 1 !important;
        }

        /* Active Descending */
        table.dataTable thead .sorting_desc:after {
            color: #ffffff !important;
            opacity: 1 !important;
        }

        /* Remove glow/shadow */
        table.dataTable thead .sorting_asc:before,
        table.dataTable thead .sorting_desc:after {
            text-shadow: none !important;
        }

        /* =========================
   DATATABLE SORTING END
   ========================= */


        #selectAll,
        .row-checkbox {
            accent-color: #14b8a6;
            cursor: pointer;
            width: 12px;
            height: 12px;
        }



        /*Aurora Effect*/
        .aurora {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .aurora::before,
        .aurora::after {
            content: "";
            position: absolute;
            border-radius: 50%;

            filter: blur(180px);

            animation: moveAurora 25s infinite alternate ease-in-out;
        }

        .aurora::before {

            background: #4f46e5;

            top: -150px;
            left: -150px;

            width: 500px;
            height: 500px;

            opacity: 0.08;
        }

        .aurora::after {

            background: #0891b2;

            bottom: -150px;
            right: -150px;

            width: 500px;
            height: 500px;

            opacity: 0.08;
        }

        @keyframes moveAurora {

            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(150px, 100px);
            }
        }

        /**/

        /* Responsive Styles */
        @media (max-width: 992px) {
            /* .sidebar {
                width: 80px;
                padding: 15px;
            } */

            .main {
                margin-left: 0;
            }

            .logo {
                font-size: 16px;
            }

            .menu li {
                text-align: center;
                padding: 10px;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;

                align-items: flex-start;

                gap: 15px;
            }

            .cards {
                grid-template-columns: 1fr;
            }

            .main {
                margin-left: 0;

                padding: 15px;
            }

            /* .sidebar {
                display: none;
            } */
        }

        /*End of responsive styles*/

        /* Action Buttons */

        .action-group {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn {
            width: 26px;
            height: 26px;

            border: none;

            border-radius: 10px;

            cursor: pointer;

            transition: all 0.25s ease;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn i {
            font-size: 14px;
        }

        .action-btn:hover {
            transform: translateY(-2px) scale(1.05);
        }

        /* View Button */
        .view-btn {
            background: #e6f7fb;
            border: 1px solid #cceef5;
            color: #0891b2;
        }

        /* .view-btn {
    background: rgba(6, 182, 212, 0.10);
    border: 1px solid rgba(6, 182, 212, 0.20);
    color: #67e8f9;
} */

        .view-btn:hover {
            background: #d7f1f8;
            color: #0e7490;
            box-shadow: none;
        }

        /* View Button End*/

        /*Edit Button */
        .edit-btn {
            background: #eef2ff;
            border: 1px solid #dbe4ff;
            color: #374151;
        }

        .edit-btn:hover {
            background: #e5eaff;
            color: #111827;
            box-shadow: none;
        }

        /*Edit Button End */

        /*Delete Button */
        .delete-btn {
            background: #fff1f2;
            border: 1px solid #fecdd3;
            color: #ef4444;
        }

        .delete-btn:hover {
            background: #ffe4e6;
            color: #dc2626;
            box-shadow: none;
        }

        /*Delete Button End */
        /* Action Button style end */

        /* =========================
   DataTables Theme Support
   ========================= */

        .dataTables_wrapper {
            /*This is the parent container of the entire DataTable. */
            width: 100% !important;
            color: var(--text) !important;
        }

        /*
dataTables_wrapper
│
├── dataTables_length
├── dataTables_filter
├── UserTable
├── dataTables_info
└── dataTables_paginate
  */
        .dataTables_length,
        .dataTables_filter,
        .dataTables_info,
        /*Showing 1 to 5 of 13 entries*/
        .dataTables_paginate

        /*Previous 1 2 3 Next*/
            {
            color: var(--text) !important;
        }

        .dataTables_filter {
            float: right;
            /* Search: [________] */
        }

        .dataTables_length {
            /*Show [5 ▼] entries*/
            float: left;
        }

        .dataTables_filter input,
        .dataTables_length select {
            background: var(--card) !important;
            color: var(--text) !important;
            border: 1px solid var(--border) !important;
            border-radius: 8px !important;
        }

        .dataTables_length select option {
            background: var(--card);
            color: var(--text);
        }


        /* TABLE */

        #UserTable {
            width: 100% !important;
            border: none !important;
            border-collapse: separate !important;
            border-spacing: 0 !important;
        }

        #UserTable thead th:first-child {
            border-top-left-radius: 6px;
        }

        #UserTable thead th:last-child {
            border-top-right-radius: 6px;
        }

        #UserTable thead th {
            color: var(--text) !important;
            background: rgba(20, 184, 166, 0.08) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border) !important;
            white-space: nowrap;

        }

        #UserTable tbody td {
            color: var(--text) !important;
            white-space: nowrap;
        }

        /* Same color for all rows */
        #UserTable tbody tr {
            background: rgba(255, 255, 255, 0.03) !important;
            transition: all 0.2s ease;
        }

        /* Hover effect only */
        #UserTable tbody tr:hover {
            background: rgba(20, 184, 166, 0.12) !important;
        }

        /* PAGINATION */

        .dataTables_wrapper .paginate_button {
            color: var(--text) !important;
        }

        .dataTables_wrapper .paginate_button.current {
            background: #14b8a6 !important;
            color: white !important;
            border: none !important;
            border-radius: 8px !important;
        }

        .dataTables_wrapper .paginate_button:not(.current):hover {
            background: rgba(20, 184, 166, 0.12) !important;
            color: #0f766e !important;
            border: none !important;
            border-radius: 8px !important;
        }

        /* REMOVE WEIRD WIDTHS */

        .dataTables_scroll,
        .dataTables_scrollBody,
        .dataTables_scrollHead {
            width: 100% !important;
        }

        /* RESPONSIVE */

        .table-card {
            width: 100%;
            overflow: hidden;
        }

        .table-container {

            background: var(--card);

            border: 1px solid var(--border);

            border-radius: 16px;

            padding: 12px;

            margin-top: 10px;

            overflow: hidden;

            box-shadow:
                0 8px 24px rgba(0, 0, 0, 0.08),
                0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .light-theme .table-container {

            background: #f8fcfc;

            border: 1px solid #dbeff0;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        /* [Column Visibility▼] [Export▼]  Custom Buttons  */

        #columnBtn,
        #exportBtn {

            margin-left: 6px;

            padding: 6px 8px;

            border: 1px solid var(--border);

            border-radius: 6px;

            background: var(--card);

            color: var(--text);

            cursor: pointer;
        }


        /* tool-wrapper and tool-menu */
        .tool-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 2px;

        }

        .tool-menu {

            display: none;
            position: absolute;
            top: 38px;
            right: 0;

            min-width: 140px;

            background: #fff;

            border: 1px solid var(--border);

            border-radius: 10px;

            box-shadow: 0 10px 25px rgba(0, 0, 0, .12);

            z-index: 999;

            max-height: 180px;

            overflow-y: auto;
        }

        .tool-menu div {

            display: flex;

            align-items: center;

            gap: 8px;

            padding: 8px 12px;

            font-size: 13px;

            cursor: pointer;
        }

        .tool-menu div:hover {

            background: rgba(20, 184, 166, .18);
        }

        .tool-menu i {

            width: 16px;

            text-align: center;

            opacity: .8;
        }

        /* tool-wrapper and tool-menu end */


        /* Custom Buttons End [Column Visibility▼] [Export▼] */

        /* STATUS BADGES */

        .status-completed {
            display: inline-flex;
            align-items: center;

            padding: 6px 14px;
            border-radius: 9px;

            background: #dff5e7;
            border: 1px solid #c5ebd3;

            color: #0f7a43;
            font-size: 13px;
            font-weight: 500;
        }

        .status-pending {
            display: inline-flex;
            align-items: center;

            padding: 6px 14px;
            border-radius: 9px;

            background: #fef3c7;
            border: 1px solid #fde68a;

            color: #b45309;
            font-size: 13px;
            font-weight: 500;
        }

        .status-processing {
            display: inline-flex;
            align-items: center;

            padding: 6px 14px;
            border-radius: 9px;

            background: #dbeafe;
            border: 1px solid #bfdbfe;

            color: #1d4ed8;
            font-size: 13px;
            font-weight: 500;
        }

        .status-inactive {
            display: inline-flex;
            align-items: center;

            padding: 6px 14px;
            border-radius: 9px;

            background: #fdeaea;
            border: 1px solid #f5c2c7;

            color: #dc3545;
            font-size: 13px;
            font-weight: 500;
        }

        /* STATUS BADGES END */


        /* ADD USER BUTTON */
        #btnAddUser:hover {

            transform: translateY(-2px);

            box-shadow:
                0 10px 20px rgba(20, 184, 166, .25);

            background: #0f766e;
        }

        /* ADD USER BUTTON END  */

        /* TOASTIFY */
        .toastify {

            padding: 12px 18px !important;

            border-radius: 12px !important;

            box-shadow:
                0 10px 25px rgba(0, 0, 0, .15) !important;

            font-family:
                "Elms Sans",
                "Segoe UI",
                sans-serif !important;

            z-index: 4000 !important;
        }

        /* sweetalert2  extra style bcz we are not using the default styles */

        .swal2-container {

            backdrop-filter: blur(2px);

            -webkit-backdrop-filter: blur(2px);

            background: rgba(15, 23, 42, 0.15) !important;
        }

        .swal2-popup {

            border-radius: 20px !important;
        }

        /* SWEEET ALERT DELETE  */

        .swal2-container {

            backdrop-filter: blur(2px);

            -webkit-backdrop-filter: blur(2px);

            background: rgba(15, 23, 42, 0.15) !important;
        }

        .vcore-delete-popup {

            border-radius: 18px !important;

            padding: 1rem !important;

            box-shadow:
                0 20px 40px rgba(0, 0, 0, .15) !important;
        }

        .vcore-delete-popup .swal2-icon {

            transform: scale(.70);

            margin: 0 auto 8px auto !important;
        }

        .vcore-delete-popup .swal2-title {

            font-size: 18px !important;

            font-weight: 600 !important;

            margin: 0 !important;
        }

        .vcore-delete-popup .swal2-html-container {

            font-size: 13px !important;

            margin-top: 8px !important;

            color: #64748b !important;
        }

        .vcore-delete-popup .swal2-actions {

            margin-top: 12px !important;
        }

        .vcore-delete-popup .swal2-confirm,
        .vcore-delete-popup .swal2-cancel {

            width: 42px !important;

            height: 42px !important;

            padding: 0 !important;

            border-radius: 10px !important;

            font-size: 15px !important;
        }
    </style>

</head>

    <div class="aurora"></div>

">

                <h3 style="margin:0;">

                </h3>

        display:flex;

        gap:8px;

        padding:10px 18px;

        border:none;
        border-radius:12px;

        background:#14b8a6;
        color:white;

        font-size:14px;
        font-weight:600;

        cursor:pointer;

        transition:all .25s ease;
    ">
                    <i class="fa fa-plus"></i>
                    Add User
                </button>

            </div>

            <!-- End  -->
            <div class="table-container">
                <div class="table-responsive">
                    <table id="UserTable">

                        <thead>
                            <tr>
                                <th>
                                    <input type="checkbox" id="selectAll">
                                </th>
                                <th>ID</th>
                                <th>Customer</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>

                        <tbody>
                        </tbody>

                    </table>

                </div>
            </div>
            <!-- new style  -->

        justify-content:space-between;
        align-items:center;">

                <div style="font-size:14px; color:#0f766e;">
                    <span id="selectedCount">0</span> row(s) selected
                </div>

                <div style="display:flex;gap:10px;">

                    <button id="activeBtn" style="
                    padding:8px 16px;
                    border:none;
                    border-radius:8px;
                    background:#22c55e;
                    color:white;">
                        Active
                    </button>

                    <button id="inactiveBtn" style="
                    padding:8px 16px;
                    border:none;
                    border-radius:8px;
                    background:#ef4444;
                    color:white;">
                        Inactive
                    </button>

                </div>

            </div>
            <!-- new style end  -->

        </div>

        <div class="footer">
            Premium Theme Transition Demo
        </div>
    </div>




    <!--  -->

    <!-- Add User Modal -->
    <div id="addModal" class="modal-overlay">

        <div class="card modal-card">

                table.rows({ page: 'current' }).every(function () {

                    const rowData = this.data();

                    rowData.selected = checked;

                    const node = $(this.node());

                    node.find('.row-checkbox')
                        .prop('checked', checked);

                    if (checked) {

                        node.addClass('row-selected');

                    } else {

                        node.removeClass('row-selected');
                    }
                });

                updateSelection();
            }
        );

        /* INDIVIDUAL CHECKBOX */

        $(document).on(
            'change',

            function () {

                const tr =
                    $(this).closest('tr');

                const row =
                    table.row(tr);

                const rowData =
                    row.data();

                rowData.selected =
                    this.checked;

                if (this.checked) {

                    tr.addClass('row-selected');

                } else {

                    tr.removeClass('row-selected');
                }

                updateSelection();
            }
        );

        table.on(

                        this.data();

                    const node =
                        $(this.node());

                    node.find('.row-checkbox')
                        .prop(
                            'checked',

                        );

                    if (rowData.selected) {

                        node.addClass(

                if (!result.isConfirmed)

        function showToast(message, type = 'success') {

            let bgColor = '#14b8a6';

            if (type === 'error') {
                bgColor = '#ef4444';
            }

            if (type === 'warning') {
                bgColor = '#f59e0b';
            }

            if (type === 'info') {
                bgColor = '#3b82f6';
            }

            Toastify({

                text: message,

                duration: 3000,

                gravity: "bottom",

                position: "right",

                close: true,

                stopOnFocus: true,

                style: {
                    background: bgColor,
                    borderRadius: "10px",
                    fontSize: "14px",
                    fontWeight: "500"
                }

            }).showToast();

        }


        function showConfirmDialog({

            title,

            text,

            type = 'update'

        }) {

            let icon = 'question';

            let confirmIcon = 'fa-check';

            let confirmColor = '#14b8a6';

            switch (type.toLowerCase()) {

                case 'add':

                    icon = 'question';

                    confirmIcon = 'fa-check';

                    confirmColor = '#14b8a6';

                    break;

                case 'update':

                    icon = 'question';

                    confirmIcon = 'fa-check';

                    confirmColor = '#14b8a6';

                    break;

                case 'delete':

                    icon = 'warning';

                    confirmIcon = 'fa-trash';

                    confirmColor = '#ef4444';

                    break;

                case 'activate':

                    icon = 'success';

                    confirmIcon = 'fa-check';

                    confirmColor = '#22c55e';

                    break;

                case 'deactivate':

                    icon = 'warning';

                    confirmIcon = 'fa-ban';

                    confirmColor = '#f59e0b';

                    break;

                case 'save':

                    icon = 'question';

                    confirmIcon = 'fa-floppy-disk';

                    confirmColor = '#14b8a6';

                    break;
            }

            return Swal.fire({

                title,

                text,

                icon,

                width: '320px',

                allowOutsideClick: true,

                allowEscapeKey: true,

                showCancelButton: true,

                reverseButtons: true,

                confirmButtonText:
                    `<i class="fa-solid ${confirmIcon}"></i>`,

                cancelButtonText:
                    '<i class="fa-solid fa-xmark"></i>',

                confirmButtonColor: confirmColor,

                cancelButtonColor: '#64748b',

                customClass: {
                    popup: 'vcore-confirm-popup'
                }
            });
        }
